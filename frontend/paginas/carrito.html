<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - InfoTek</title>
    <link rel="stylesheet" href="../estilos/estilos.css">
</head>
<footer class="footer">
    <div class="footer-contenido">

        <div class="footer-links">
            <a href="#">Términos y Condiciones</a>
            <a href="#">Política de Privacidad</a>
            <a href="#">Política de Cookies</a>
            <a href="#">Política de Envío</a>
        </div>

        <div class="footer-redes">
            <a href="#" class="red"><img src="../recursos/imagenes/facebook.png" alt="Facebook"></a>
            <a href="#" class="red"><img src="../recursos/imagenes/twitter.png" alt="Twitter"></a>
            <a href="#" class="red"><img src="../recursos/imagenes/instagram.png" alt="Instagram"></a>
            <a href="#" class="red"><img src="../recursos/imagenes/youtube.png" alt="YouTube"></a>
        </div>

        <p class="footer-copy">© 2026 InfoTek. Todos los derechos reservados.</p>

    </div>
</footer>

<body>

    <header id="encabezado"></header>

    <main class="contenedor">

        <h1 class="titulo">Tu carrito</h1>

        <table class="tabla-carrito">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="lista-carrito">
                <!-- JS insertará los productos -->
            </tbody>
        </table>

        <div class="carrito-resumen">
            <p>Total: <span id="total-carrito">0€</span></p>
            <button class="btn" id="btn-comprar">Finalizar compra</button>
        </div>

    </main>

    <script src="../scripts/carrito.js"></script>
</body>
</html>
